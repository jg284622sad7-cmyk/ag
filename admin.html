<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Control Center | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Syncopate:wght@400;700&display=swap');

        body { 
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: white;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 70%);
            min-height: 100vh;
        }

        .font-syncopate { font-family: 'Syncopate', sans-serif; }
        
        .gold-accent { color: #D4AF37; }
        .bg-gold-accent { background-color: #D4AF37; }
        .border-gold-accent { border-color: #D4AF37; }

        .input-stark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-stark:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            background: rgba(0, 0, 0, 0.8);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="mb-12 border-b border-white/10 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-syncopate font-black tracking-widest text-white drop-shadow-md">TM <span class="gold-accent">CONTROL</span></h1>
            <p class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 mt-2 font-bold">PROTOCOLO DE ACCESO: ADMINISTRADOR</p>
        </div>
        <div class="hidden md:flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-[9px] font-syncopate text-zinc-400 tracking-widest">FIREBASE BASE64 ONLINE</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 mb-20">
        
        <div class="lg:col-span-1 bg-zinc-950/80 border border-white/5 p-8 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,1)] h-fit">
            <h2 class="text-sm font-syncopate tracking-widest text-white mb-6 border-b border-white/10 pb-4" id="form-title">NUEVO EVENTO</h2>
            
            <form id="evento-form" class="flex flex-col gap-5">
                <input type="hidden" id="evento-id">
                <input type="hidden" id="foto-base64-actual">

                <div>
                    <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Nombre del Evento</label>
                    <input type="text" id="nombre" required class="input-stark w-full p-3 text-xs rounded-sm" placeholder="Ej: BAD BUNNY">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Fecha</label>
                        <input type="date" id="fecha" required class="input-stark w-full p-3 text-xs rounded-sm text-zinc-300">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Ubicación</label>
                        <input type="text" id="ubicacion" required class="input-stark w-full p-3 text-xs rounded-sm" placeholder="Ej: ESTADIO PASCUAL...">
                    </div>
                </div>

                <div>
                    <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Imagen desde Galería (Max 500KB recom.)</label>
                    <input type="file" id="foto-file" accept="image/*" class="input-stark w-full p-3 text-xs rounded-sm file:mr-4 file:py-1 file:px-3 file:rounded-sm file:border-0 file:text-[9px] file:font-syncopate file:bg-white file:text-black hover:file:bg-zinc-300 text-zinc-400">
                    <p id="foto-preview-text" class="text-[8px] text-gold-accent mt-2 font-mono hidden">✓ Imagen actual guardada en memoria.</p>
                </div>

                <div>
                    <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">URL Video Promocional (Opcional)</label>
                    <input type="url" id="videoPromo" class="input-stark w-full p-3 text-xs rounded-sm" placeholder="https://...">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Estado del Acceso</label>
                        <select id="estado" class="input-stark w-full p-3 text-xs rounded-sm">
                            <option value="disponible">DISPONIBLE</option>
                            <option value="por_agotar">ÚLTIMAS (POR AGOTAR)</option>
                            <option value="agotado">SOLD OUT</option>
                        </select>
                    </div>
                    <div class="flex items-center justify-center mt-5">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="destacado" class="hidden peer">
                            <div class="w-5 h-5 border border-white/30 peer-checked:bg-gold-accent peer-checked:border-gold-accent transition-all flex items-center justify-center">
                                <svg class="w-3 h-3 text-black opacity-0 peer-checked:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <span class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold group-hover:text-white transition-colors">Destacado VIP</span>
                        </label>
                    </div>
                </div>

                <div class="flex gap-3 mt-4">
                    <button type="submit" id="btn-guardar" class="flex-1 bg-white text-black font-syncopate text-[10px] font-black tracking-widest py-4 uppercase hover:bg-gold-accent hover:text-black transition-all border border-transparent shadow-[0_0_15px_rgba(255,255,255,0.2)]">GUARDAR EVENTO</button>
                    <button type="button" onclick="resetFormEvento()" class="px-6 border border-white/20 text-white font-syncopate text-[10px] tracking-widest hover:bg-white/10 transition-all">X</button>
                </div>
            </form>
        </div>

        <div class="lg:col-span-2">
            <h2 class="text-sm font-syncopate tracking-widest text-white mb-6 border-b border-zinc-800 pb-4">CARTELERA ACTIVA</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-zinc-800 bg-zinc-900/50">
                            <th class="p-4 text-[9px] font-syncopate tracking-widest text-zinc-500 uppercase">Evento</th>
                            <th class="p-4 text-[9px] font-syncopate tracking-widest text-zinc-500 uppercase">Fecha / Ubicación</th>
                            <th class="p-4 text-[9px] font-syncopate tracking-widest text-zinc-500 uppercase">Estado</th>
                            <th class="p-4 text-[9px] font-syncopate tracking-widest text-zinc-500 uppercase text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-eventos" class="text-xs text-zinc-300">
                    </tbody>
                </table>
            </div>
        </div>
    </div>


    <hr class="border-zinc-800 mb-12">
    <div class="mb-12 flex justify-between items-end">
        <div>
            <h2 class="text-2xl font-syncopate font-black tracking-widest text-white drop-shadow-md">TM <span class="gold-accent">LEGADO</span></h2>
            <p class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 mt-2 font-bold">GESTOR DE GALERÍA / FLYERS</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
        <div class="lg:col-span-1 bg-zinc-950/80 border border-white/5 p-8 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,1)] h-fit">
            <h2 class="text-sm font-syncopate tracking-widest text-white mb-6 border-b border-white/10 pb-4">AGREGAR FLYER</h2>
            
            <form id="flyer-form" class="flex flex-col gap-5">
                <div>
                    <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Flyer desde Galería</label>
                    <input type="file" id="flyer-file" accept="image/*" required class="input-stark w-full p-3 text-xs rounded-sm file:mr-4 file:py-1 file:px-3 file:rounded-sm file:border-0 file:text-[9px] file:font-syncopate file:bg-white file:text-black hover:file:bg-zinc-300 text-zinc-400">
                </div>
                <div>
                    <label class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-2 block">Título / Evento (Opcional)</label>
                    <input type="text" id="flyer-titulo" class="input-stark w-full p-3 text-xs rounded-sm" placeholder="Ej: Tomorrowland 2023">
                </div>
                <button type="submit" id="btn-guardar-flyer" class="mt-4 bg-white text-black font-syncopate text-[10px] font-black tracking-widest py-4 uppercase hover:bg-gold-accent hover:text-black transition-all border border-transparent">AGREGAR AL LEGADO</button>
            </form>
        </div>

        <div class="lg:col-span-3">
            <div id="grid-flyers" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
        </div>
    </div>

    <script>
        // =====================================
        // NUEVAS LLAVES DE FIREBASE INYECTADAS
        // =====================================
        const dbConfig = {
            apiKey: "AIzaSyDskSUHHTDdX7KxYmDlS8zknPnsCH40DfM",
            authDomain: "agentretainment-f62ac.firebaseapp.com",
            databaseURL: "https://agentretainment-f62ac-default-rtdb.firebaseio.com",
            projectId: "agentretainment-f62ac",
            storageBucket: "agentretainment-f62ac.firebasestorage.app",
            messagingSenderId: "178321269478",
            appId: "1:178321269478:web:980d8939418fe658029127"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(dbConfig);
        const database = firebase.database();

        // CONVERTIDOR A BASE64 TÁCTICO
        function convertirABase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        /* ============================
           LÓGICA: EVENTOS
           ============================ */
        const formEv = document.getElementById('evento-form');
        const tablaEv = document.getElementById('tabla-eventos');
        const btnGuardarEv = document.getElementById('btn-guardar');
        const formTitleEv = document.getElementById('form-title');

        database.ref('eventos').on('value', snap => {
            tablaEv.innerHTML = '';
            if(!snap.exists()) {
                tablaEv.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-zinc-600 font-mono">No hay eventos en la nueva matriz.</td></tr>';
                return;
            }
            snap.forEach(child => {
                let evento = child.val();
                let key = child.key;

                let estadoBadge = '';
                if(evento.estado === 'agotado') estadoBadge = '<span class="bg-red-500/20 text-red-500 border border-red-500/50 px-2 py-1 text-[8px] rounded uppercase font-bold">Sold Out</span>';
                else if(evento.estado === 'por_agotar') estadoBadge = '<span class="bg-orange-500/20 text-orange-500 border border-orange-500/50 px-2 py-1 text-[8px] rounded uppercase font-bold">Por Agotar</span>';
                else estadoBadge = '<span class="bg-green-500/20 text-green-500 border border-green-500/50 px-2 py-1 text-[8px] rounded uppercase font-bold">Disponible</span>';
                let desc = evento.destacado ? '<span class="text-yellow-500 ml-2">★</span>' : '';

                tablaEv.innerHTML += `
                    <tr class="border-b border-zinc-900 hover:bg-zinc-900/30">
                        <td class="p-4 flex items-center gap-3">
                            <img src="${evento.foto}" class="w-10 h-10 object-cover rounded-sm border border-zinc-700">
                            <p class="font-bold text-white uppercase">${evento.nombre} ${desc}</p>
                        </td>
                        <td class="p-4 text-zinc-400">${evento.fecha} <br> <span class="text-[9px] uppercase text-zinc-600">${evento.ubicacion}</span></td>
                        <td class="p-4">${estadoBadge}</td>
                        <td class="p-4 text-right">
                            <button onclick="editarEvento('${key}')" class="text-zinc-400 hover:text-white px-2 py-1 text-[10px] tracking-widest uppercase mr-2">EDITAR</button>
                            <button onclick="eliminarEvento('${key}', '${evento.nombre}')" class="text-red-500/70 hover:text-red-500 px-2 py-1 text-[10px] tracking-widest uppercase">BORRAR</button>
                        </td>
                    </tr>
                `;
            });
        });

        formEv.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnGuardarEv.innerText = "ENCRIPTANDO...";
            btnGuardarEv.disabled = true;

            const id = document.getElementById('evento-id').value;
            const fileInput = document.getElementById('foto-file');
            let fotoFinal = document.getElementById('foto-base64-actual').value;

            try {
                if (fileInput.files.length > 0) {
                    fotoFinal = await convertirABase64(fileInput.files[0]);
                }

                if (!fotoFinal) {
                    alert("⚠️ Jefe, seleccione una imagen de su galería primero.");
                    btnGuardarEv.innerText = "GUARDAR EVENTO";
                    btnGuardarEv.disabled = false;
                    return;
                }

                const data = {
                    nombre: document.getElementById('nombre').value,
                    fecha: document.getElementById('fecha').value,
                    ubicacion: document.getElementById('ubicacion').value,
                    foto: fotoFinal,
                    videoPromo: document.getElementById('videoPromo').value,
                    estado: document.getElementById('estado').value,
                    destacado: document.getElementById('destacado').checked
                };

                if (id) {
                    await database.ref('eventos/' + id).update(data);
                    btnGuardarEv.innerText = "ACTUALIZADO"; 
                } else {
                    await database.ref('eventos').push(data);
                    btnGuardarEv.innerText = "CREADO"; 
                }
                
                btnGuardarEv.classList.add('bg-green-500');
                setTimeout(resetFormEvento, 1000);

            } catch (error) {
                console.error(error);
                btnGuardarEv.innerText = "ERROR";
                btnGuardarEv.disabled = false;
            }
        });

        function editarEvento(key) {
            database.ref('eventos/' + key).once('value').then(snap => {
                const ev = snap.val();
                document.getElementById('evento-id').value = key;
                document.getElementById('nombre').value = ev.nombre;
                document.getElementById('fecha').value = ev.fecha;
                document.getElementById('ubicacion').value = ev.ubicacion;
                
                document.getElementById('foto-base64-actual').value = ev.foto;
                document.getElementById('foto-preview-text').classList.remove('hidden');
                
                document.getElementById('videoPromo').value = ev.videoPromo || '';
                document.getElementById('estado').value = ev.estado;
                document.getElementById('destacado').checked = ev.destacado || false;
                
                formTitleEv.innerText = "EDITAR: " + ev.nombre;
                formTitleEv.classList.add('text-gold-accent');
                btnGuardarEv.innerText = "ACTUALIZAR";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function eliminarEvento(key, nombre) {
            if(confirm(`¿Eliminar a ${nombre} del sistema?`)) database.ref('eventos/' + key).remove();
        }

        function resetFormEvento() {
            formEv.reset();
            document.getElementById('evento-id').value = '';
            document.getElementById('foto-base64-actual').value = '';
            document.getElementById('foto-preview-text').classList.add('hidden');
            formTitleEv.innerText = "NUEVO EVENTO";
            formTitleEv.classList.remove('text-gold-accent');
            btnGuardarEv.innerText = "GUARDAR EVENTO";
            btnGuardarEv.classList.remove('bg-green-500');
            btnGuardarEv.disabled = false;
        }

        /* ============================
           LÓGICA: GALERÍA DE FLYERS
           ============================ */
        const formFl = document.getElementById('flyer-form');
        const gridFl = document.getElementById('grid-flyers');
        const btnGuardarFl = document.getElementById('btn-guardar-flyer');

        database.ref('flyers').on('value', snap => {
            gridFl.innerHTML = '';
            if(!snap.exists()) {
                gridFl.innerHTML = '<p class="col-span-4 p-8 text-zinc-600 font-mono">No hay flyers en el Legado.</p>';
                return;
            }
            snap.forEach(child => {
                let fl = child.val();
                let key = child.key;
                gridFl.innerHTML += `
                    <div class="relative group border border-white/10 rounded overflow-hidden aspect-[3/4]">
                        <img src="${fl.url}" class="w-full h-full object-cover filter grayscale hover:grayscale-0 transition-all duration-500">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex flex-col justify-end p-4 transition-opacity">
                            <p class="text-white text-[9px] uppercase tracking-widest font-syncopate mb-3">${fl.titulo || 'FLYER'}</p>
                            <button onclick="eliminarFlyer('${key}')" class="bg-red-600 text-white py-2 text-[10px] font-bold tracking-widest uppercase hover:bg-red-500 transition-colors border border-red-800">BORRAR</button>
                        </div>
                    </div>
                `;
            });
        });

        formFl.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnGuardarFl.innerText = "ENCRIPTANDO...";
            btnGuardarFl.disabled = true;

            const fileInput = document.getElementById('flyer-file');
            const titulo = document.getElementById('flyer-titulo').value;

            if (fileInput.files.length === 0) {
                alert("Seleccione un flyer.");
                btnGuardarFl.innerText = "AGREGAR AL LEGADO";
                btnGuardarFl.disabled = false;
                return;
            }

            try {
                const base64Image = await convertirABase64(fileInput.files[0]);
                
                await database.ref('flyers').push({
                    url: base64Image,
                    titulo: titulo
                });
                
                btnGuardarFl.innerText = "AÑADIDO AL LEGADO";
                btnGuardarFl.classList.add('bg-green-500');
                
                setTimeout(() => {
                    formFl.reset();
                    btnGuardarFl.innerText = "AGREGAR AL LEGADO";
                    btnGuardarFl.classList.remove('bg-green-500');
                    btnGuardarFl.disabled = false;
                }, 1500);

            } catch (error) {
                console.error(error);
                btnGuardarFl.innerText = "ERROR";
                btnGuardarFl.disabled = false;
            }
        });

        function eliminarFlyer(key) {
            if(confirm(`¿Eliminar este Flyer del Legado?`)) database.ref('flyers/' + key).remove();
        }

    </script>
</body>
</html>
